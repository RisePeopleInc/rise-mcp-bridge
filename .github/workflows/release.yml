name: release

# Tag a version (e.g. v0.1.0) to build, sign, notarize, and publish the
# rise-mcp-bridge binaries + SHA256SUMS to a GitHub Release. Consuming plugins
# fetch these artifacts at setup time and verify them against SHA256SUMS.
#
# Signing reuses Rise's existing infrastructure (see raise-editor):
#   - macOS:   Developer ID Application cert via MAC_CSC_LINK / MAC_CSC_KEY_PASSWORD,
#              notarized with APPLE_ID / APPLE_TEAM_ID / APPLE_APP_SPECIFIC_PASSWORD.
#   - Windows: Azure Artifact Signing (Trusted Signing) over GitHub OIDC — no stored
#              client secret. Account/profile/endpoint come from repo Variables
#              (TRUSTED_SIGNING_*); the AZURE_* secrets are public OIDC identifiers.
#              Requires a federated credential on the signing Entra app for this
#              repo+environment (see README "Signing setup").

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_signing:
        description: "Build unsigned (dry run, no secrets needed)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ---- macOS: universal binary, Developer ID signed + notarized ----------
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }

      - name: Build universal binary
        run: |
          set -euo pipefail
          mkdir -p dist
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/arm64 .
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/amd64 .
          lipo -create -output dist/rise-mcp-bridge-darwin-universal dist/arm64 dist/amd64
          rm -f dist/arm64 dist/amd64

      - name: Codesign + notarize (bare binary + installer .app)
        if: ${{ inputs.skip_signing != true }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BIN=dist/rise-mcp-bridge-darwin-universal
          KCPW=ci-temp-$RANDOM

          # Import the Developer ID Application cert into a throwaway keychain.
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KCPW" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain
          security unlock-keychain -p "$KCPW" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" build.keychain
          rm -f /tmp/cert.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          echo "Signing as: $IDENTITY"

          notarize() { xcrun notarytool submit "$1" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait; }

          # 1) Bare universal binary (Claude Code CLI / power users). Can't be stapled.
          codesign --force --options runtime --timestamp --entitlements entitlements.plist --sign "$IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          ditto -c -k --keepParent "$BIN" /tmp/bin.zip && notarize /tmp/bin.zip && rm -f /tmp/bin.zip

          # 2) Double-click installer app (notarizable AND stapleable, unlike a bare binary).
          VER="${VERSION#v}"
          APP=dist/RiseMCPBridge.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/RiseMCPBridge"
          # Second, loose copy that the installer self-installs. It is NOT the bundle's
          # CFBundleExecutable, so --deep signs it as a standalone Mach-O whose signature
          # has no Info.plist binding — unlike the main exe, it stays valid once copied
          # out of the bundle to ~/.rise-mcp-bridge. (Copying the main exe out gives
          # "invalid Info.plist (plist or signature have been modified)" and AMFI kills it.)
          cp "$BIN" "$APP/Contents/MacOS/rise-mcp-bridge"
          cp packaging/macos/AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Rise MCP Bridge</string>
            <key>CFBundleDisplayName</key><string>Rise MCP Bridge</string>
            <key>CFBundleIdentifier</key><string>com.risepeople.rise-mcp-bridge</string>
            <key>CFBundleExecutable</key><string>RiseMCPBridge</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleVersion</key><string>${VER:-0.0.0}</string>
            <key>CFBundleShortVersionString</key><string>${VER:-0.0.0}</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          codesign --force --deep --options runtime --timestamp --entitlements entitlements.plist --sign "$IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"
          # Guard: the installer copies Contents/MacOS/rise-mcp-bridge OUT of the bundle,
          # so it must verify as a bare file on its own. Prove that here (this is exactly
          # the check that "killed: invalid Info.plist" would have failed pre-fix).
          cp "$APP/Contents/MacOS/rise-mcp-bridge" /tmp/payload-check
          codesign --verify --strict --verbose=2 /tmp/payload-check
          rm -f /tmp/payload-check
          ditto -c -k --keepParent "$APP" /tmp/app.zip && notarize /tmp/app.zip && rm -f /tmp/app.zip
          xcrun stapler staple "$APP"
          ( cd dist && ditto -c -k --keepParent RiseMCPBridge.app RiseMCPBridge.app.zip && rm -rf RiseMCPBridge.app )
          echo "built dist/RiseMCPBridge.app.zip (notarized + stapled)"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/rise-mcp-bridge-darwin-universal
            dist/RiseMCPBridge.app.zip
          if-no-files-found: error

  # ---- Windows: Azure Artifact Signing over OIDC -------------------------
  build-win:
    runs-on: windows-latest
    # Federated-credential scope: only runs declaring this environment can mint
    # an OIDC token the Entra app accepts. Must match the federated credential
    # subject repo:RisePeopleInc/rise-mcp-bridge:environment:rise-mcp-bridge-signing
    environment: rise-mcp-bridge-signing
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }

      - name: Embed icon + version resource
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Parse vMAJ.MIN.PATCH from the tag; fall back to 0.0.0 for dry-run dispatches.
          VER="${VERSION#v}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then VER="0.0.0"; fi
          IFS='.' read -r MAJ MIN PAT <<< "$VER"
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.0
          # Filename suffix _windows_amd64 makes Go link the .syso only for that target.
          "$(go env GOPATH)/bin/goversioninfo" \
            -64 \
            -o resource_windows_amd64.syso \
            -icon packaging/windows/icon.ico \
            -ver-major "$MAJ" -ver-minor "$MIN" -ver-patch "$PAT" \
            -product-version "$VER" -file-version "$VER" \
            packaging/windows/versioninfo.json

      - name: Build Windows exe
        shell: bash
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/rise-mcp-bridge-windows-amd64.exe .

      - uses: actions/setup-dotnet@v5
        if: ${{ inputs.skip_signing != true }}
        with: { dotnet-version: "8.0.x" }

      - name: Install Artifact Signing dlib
        if: ${{ inputs.skip_signing != true }}
        shell: pwsh
        run: |
          $packageVersion = '1.0.95'  # bump after verifying on nuget.org/packages/Microsoft.Trusted.Signing.Client
          nuget install Microsoft.Trusted.Signing.Client -Version $packageVersion -OutputDirectory "$env:RUNNER_TEMP\artifact-signing"
          $dlib = Get-ChildItem -Path "$env:RUNNER_TEMP\artifact-signing" -Recurse -Filter 'Azure.CodeSigning.Dlib.dll' | Select-Object -First 1
          if (-not $dlib) { Write-Error "Azure.CodeSigning.Dlib.dll not found"; exit 1 }
          "AZURE_ARTIFACT_SIGNING_DLIB_PATH=$($dlib.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Locate signtool.exe
        if: ${{ inputs.skip_signing != true }}
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe","C:\Program Files\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          "SIGNTOOL_PATH=$($signtool.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Write Artifact Signing metadata
        if: ${{ inputs.skip_signing != true }}
        shell: pwsh
        run: |
          $metadataPath = "$env:RUNNER_TEMP\artifact-signing-metadata.json"
          @'
          {
            "Endpoint": "${{ vars.TRUSTED_SIGNING_ENDPOINT }}",
            "CodeSigningAccountName": "${{ vars.TRUSTED_SIGNING_ACCOUNT }}",
            "CertificateProfileName": "${{ vars.TRUSTED_SIGNING_PROFILE }}"
          }
          '@ | Out-File -Encoding utf8 $metadataPath
          "AZURE_ARTIFACT_SIGNING_METADATA_PATH=$metadataPath" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Azure login (OIDC)
        if: ${{ inputs.skip_signing != true }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign exe
        if: ${{ inputs.skip_signing != true }}
        shell: pwsh
        run: |
          & "$env:SIGNTOOL_PATH" sign /v /fd SHA256 /tr http://timestamp.acs.microsoft.com /td SHA256 `
            /dlib "$env:AZURE_ARTIFACT_SIGNING_DLIB_PATH" /dmdf "$env:AZURE_ARTIFACT_SIGNING_METADATA_PATH" `
            "dist\rise-mcp-bridge-windows-amd64.exe"

      - name: Verify signature
        if: ${{ inputs.skip_signing != true }}
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "dist\rise-mcp-bridge-windows-amd64.exe"
          $sig | Format-List
          if ($sig.Status -ne 'Valid') { Write-Error "signature not Valid: $($sig.Status)"; exit 1 }

      - name: Name the double-click installer copy (same signed bytes)
        shell: bash
        run: cp dist/rise-mcp-bridge-windows-amd64.exe dist/RiseMCPBridge.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/rise-mcp-bridge-windows-amd64.exe
            dist/RiseMCPBridge.exe
          if-no-files-found: error

  # ---- Linux -------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/rise-mcp-bridge-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/rise-mcp-bridge-linux-amd64 }

  # ---- Assemble checksums + publish release ------------------------------
  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with: { path: staging }
      - name: Collect + checksum
        run: |
          set -euo pipefail
          mkdir -p dist
          find staging -type f -exec cp {} dist/ \;
          ( cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS )
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
